paths:
  /api/v1/editions:
    get:
      description: Get all editions for a game system
      parameters:
      - description: Game system ID
        in: query
        name: game_system_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/core.EditionOutput'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Error'
      summary: List editions
      tags:
      - editions
    post:
      consumes:
      - application/json
      description: Create a new edition for a game system
      parameters:
      - description: Edition data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/core.CreateEditionInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/core.EditionOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Error'
      summary: Create edition
      tags:
      - editions
  /api/v1/editions/{id}:
