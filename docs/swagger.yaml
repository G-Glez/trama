basePath: /
definitions:
  apierror.Error:
    properties:
      error:
        type: string
    type: object
  core.CreateFactionInput:
    properties:
      edition_id:
        type: string
      game_system_id:
        type: string
      name:
        type: string
    type: object
  core.FactionOutput:
    properties:
      created_at:
        type: string
      edition_id:
        type: string
      game_system_id:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  core.UpdateFactionInput:
    properties:
      edition_id:
        type: string
      game_system_id:
        type: string
      name:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Tournament Records and Metrics Assistant
  title: TRAMA API
  version: "1.0"
paths:
  /api/v1/factions:
    get:
      description: Get all factions for an edition
      parameters:
      - description: Edition ID
        in: query
        name: edition_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/core.FactionOutput'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Error'
      summary: List factions
      tags:
      - factions
    post:
      consumes:
      - application/json
      description: Create a new faction
      parameters:
      - description: Faction data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/core.CreateFactionInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/core.FactionOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Error'
      summary: Create faction
      tags:
      - factions
  /api/v1/factions/{id}:
    delete:
      description: Delete a faction by ID
      parameters:
      - description: Faction ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Error'
      summary: Delete faction
      tags:
      - factions
    get:
      description: Get a faction by ID
      parameters:
      - description: Faction ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/core.FactionOutput'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Error'
      summary: Get faction
      tags:
      - factions
    put:
      consumes:
      - application/json
      description: Update a faction by ID
      parameters:
      - description: Faction ID
        in: path
        name: id
        required: true
        type: string
      - description: Faction data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/core.UpdateFactionInput'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Error'
      summary: Update faction
      tags:
      - factions
  /ping:
    get:
      description: Returns pong
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
swagger: "2.0"
